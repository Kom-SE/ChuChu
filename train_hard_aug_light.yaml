# 训练增强 + 数据增强 v2：更温和版本

task: detect
mode: train

model: yolov8m.pt
data: neu_det_hard_aug.yaml
device: 0
pretrained: true

epochs: 200
batch: 24
imgsz: 640

lr0: 0.001
patience: 50
optimizer: AdamW
weight_decay: 0.0005
cos_lr: true

warmup_epochs: 3
workers: 8
cache: true
amp: true

# 更保守的 Mosaic
mosaic: 0.2
close_mosaic: 50
mixup: 0.0

# 更轻的几何增强
degrees: 3.0
translate: 0.08
scale: 0.2
shear: 0.0

# 保留上下/左右翻转
flipud: 0.5
fliplr: 0.5

# 减弱颜色扰动
hsv_h: 0.01
hsv_s: 0.2
hsv_v: 0.15

project: runs/detect
name: neu_det_yolov8m_hard_aug_light
exist_ok: false
save: true
