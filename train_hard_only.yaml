# Ultralytics YOLO 训练配置（可直接用于 `yolo train cfg=train.yaml`）

# 任务与模式
task: detect
mode: train

# 核心配置
model: yolov8m.pt  # 预训练模型权重
data: neu_det_hard_aug.yaml  # 数据集配置文件（类别、训练/验证路径）
device: 0  # 使用第 1 张 GPU
pretrained: true

# 训练超参数
epochs: 200  # 训练轮数
batch: 24  # 24GB 显存下的保守设置，稳定优先
imgsz: 640  # 输入图像尺寸
lr0: 0.001  # 初始学习率
patience: 30  # 早停等待轮数（验证集不提升时触发）
optimizer: AdamW  # 优化器类型
momentum: 0.937  # 动量（对 SGD/Adam 类优化器生效）
weight_decay: 0.0005  # 权重衰减
warmup_epochs: 3  # 学习率预热轮数
warmup_momentum: 0.8  # 预热阶段动量
warmup_bias_lr: 0.1  # 预热阶段偏置层学习率
workers: 8  # 数据加载线程数
cache: true  # 缓存图片，加快训练
amp: true  # 混合精度训练
cos_lr: true  # 余弦退火学习率
close_mosaic: 10  # 最后 10 个 epoch 关闭 Mosaic

# 数据增强
mosaic: 0.8  # Mosaic 增强概率
mixup: 0.0  # NEU-DET 这类缺陷检测通常不建议过强 MixUp
hsv_h: 0.015  # 色调扰动幅度
hsv_s: 0.5  # 饱和度扰动幅度
hsv_v: 0.3  # 亮度扰动幅度
degrees: 0.0  # 随机旋转角度范围
translate: 0.1  # 随机平移比例
scale: 0.5  # 随机缩放比例
shear: 0.0  # 随机错切角度
flipud: 0.0  # 垂直翻转概率
fliplr: 0.5  # 水平翻转概率

# 训练输出
project: runs/detect  # 输出根目录
name: neu_det_yolov8m  # 本次实验名称
exist_ok: false  # 若同名目录已存在，是否允许覆盖
save: true  # 保存训练结果与权重